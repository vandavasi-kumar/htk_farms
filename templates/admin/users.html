{% extends "admin/base.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">All Users</h2>

<table style="width:100%; border-collapse: collapse; table-layout: fixed; background:white;">

    <thead style="background:#2c3e50; color:white;">
        <tr>
            <th style="padding:12px; width:10%; text-align:left;">ID</th>
            <th style="padding:12px; width:30%; text-align:left;">Username</th>
            <th style="padding:12px; width:40%; text-align:left;">Email</th>
            <th style="padding:12px; width:20%; text-align:center;">Action</th>
        </tr>
    </thead>

    <tbody>
        {% for user in users %}
        <tr style="border-bottom:1px solid #ddd;">

            <td style="padding:10px; text-align:left;">{{ user.id }}</td>

            <td style="padding:10px; text-align:left;">
                {{ user.username }}
            </td>

            <td style="padding:10px; text-align:left;">
                {{ user.email }}
            </td>

            <td style="padding:10px; text-align:center;">
                {% if user != request.user %}
                <button onclick="confirmDelete({{ user.id }})"
                    style="background:red; color:white; padding:6px 12px; border:none; border-radius:5px; cursor:pointer;">
                    Delete
                </button>
                {% else %}
                <span style="color:gray;">You</span>
                {% endif %}
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>
<div id="deleteModal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
">

    <div style="
        background:white;
        padding:20px;
        border-radius:10px;
        width:320px;
        text-align:center;
        box-shadow:0 5px 15px rgba(0,0,0,0.3);
    ">
        <h3>Delete User</h3>

        <input type="password" id="modalPassword" placeholder="Enter admin password"
            style="width:100%; padding:10px; margin:15px 0; border:1px solid #ccc; border-radius:5px;">

        <div>
            <button onclick="submitDelete()"
                style="background:red; color:white; padding:8px 15px; border:none; border-radius:5px;">
                Confirm
            </button>

            <button onclick="closeModal()" style="margin-left:10px; padding:8px 15px;">
                Cancel
            </button>
        </div>
    </div>
</div>
<!-- 🔥 Hidden Form -->
<form id="deleteForm" method="POST" style="display:none;">
    {% csrf_token %}
    <input type="hidden" name="admin_password" id="adminPassword">
</form>
<script>
    let selectedUserId = null;

    function confirmDelete(userId) {
        selectedUserId = userId;
        document.getElementById("deleteModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("deleteModal").style.display = "none";
        document.getElementById("modalPassword").value = "";
    }

    function submitDelete() {
        let password = document.getElementById("modalPassword").value;

        if (!password) {
            alert("Password required!");
            return;
        }

        let form = document.getElementById("deleteForm");
        document.getElementById("adminPassword").value = password;
        form.action = "/admin-users/delete/" + selectedUserId + "/";
        form.submit();
    }
</script>
{% endblock %}
