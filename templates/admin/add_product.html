{% extends "admin/base.html" %}

{% block content %}

<div class="container mt-4">

  <h2 class="mb-4 fw-bold">➕ Add Product</h2>

  <div class="card shadow-sm">
    <div class="card-body">

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{ form.non_field_errors }}
        
        {% for field in form %}
          <div class="mb-3">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
              <div class="text-danger">{{ field.errors }}</div>
            {% endif %}
          </div>
        {% endfor %}
        
        <!-- Override category select with custom -->
        <div class="mb-3">
          <label>Category</label>
          <select name="category" class="form-select" required>
            <option value="">Select Category</option>
            {% for c in categories %}
              <option value="{{ c.id }}" {% if form.category.value == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        
        <!-- Custom featured checkbox -->
        <div class="mb-3 form-check">
          {{ form.is_featured }}
          <label class="form-check-label fw-bold">🌟 Featured Product (Shows on Home)</label>
        </div>

        <button class="btn btn-success w-100">
          Add Product
        </button>

      </form>

    </div>
  </div>

</div>

{% endblock %}
