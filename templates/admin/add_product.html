{% extends "admin/base.html" %}

{% block content %}

<div class="container mt-4">

  <h2 class="mb-4 fw-bold">➕ Add Product</h2>

  <div class="card shadow-sm">
    <div class="card-body">

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- NAME -->
        <div class="mb-3">
          <label>Product Name</label>
          <input type="text" name="name" class="form-control" required>
        </div>

        <!-- CATEGORY -->
        <div class="mb-3">
          <label>Category</label>
          <select name="category" class="form-select" required>
            <option value="">Select Category</option>
            {% for c in categories %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- PRICE -->
        <div class="mb-3">
          <label>Price</label>
          <input type="number" step="0.01" name="price" class="form-control" required>
        </div>

        <!-- STOCK -->
        <div class="mb-3">
          <label>Stock</label>
          <input type="number" name="stock" class="form-control" required>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-3">
          <label>Description</label>
          <textarea name="description" class="form-control" required></textarea>
        </div>

        <!-- FEATURED CHECKBOX -->
        <div class="mb-3 form-check">
          <input type="checkbox" name="is_featured" class="form-check-input" id="is_featured">
          <label class="form-check-label fw-bold">🌟 Featured Product (Shows on Home)</label>
        </div>

        <!-- CARD IMAGE -->
        <div class="mb-3">
          <label>Card Image</label>
          <input type="file" name="card_image" class="form-control" required>
        </div>

        <!-- DETAIL IMAGE -->
        <div class="mb-3">
          <label>Detail Image</label>
          <input type="file" name="detail_image" class="form-control" required>
        </div>

        <button class="btn btn-success w-100">
          Add Product
        </button>

      </form>

    </div>
  </div>

</div>

{% endblock %}
