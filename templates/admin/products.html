{% extends "admin/base.html" %}

{% block content %}

<div class="container mt-4">

  <h2 class="mb-4 fw-bold">🛒 Products</h2>

  <a href="/admin-products/add/" class="btn btn-success mb-3">
    + Add Product
  </a>

  <div class="card shadow-sm">
    <div class="card-body">

      <table class="table table-hover">

        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Featured</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for p in products %}
          <tr>
            <td>#{{ p.id }}</td>
            <td>{{ p.name }}</td>
            <td>₹{{ p.price }}</td>
            <td>{{ p.stock }}</td>
            <td>{% if p.is_featured %}🌟 Yes{% else %}❌ No{% endif %}</td>

            <td>
              <a href="/admin-products/edit/{{ p.id }}/" class="btn btn-sm btn-warning">
  Edit
</a>

              <a href="{% url 'delete_product' p.id %}" 
   class="btn btn-sm btn-danger"
   onclick="return confirm('Are you sure you want to delete this product?');">
  Delete
</a>
            </td>

          </tr>
          {% endfor %}
        </tbody>

      </table>

    </div>
  </div>

</div>

{% endblock %}
