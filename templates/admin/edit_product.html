{% extends "admin/base.html" %}

{% block content %}

<div class="container mt-4">

  <h2 class="mb-4 fw-bold">✏️ Edit Product</h2>

  <div class="card shadow-sm">
    <div class="card-body">

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- NAME -->
        <div class="mb-3">
          <label>Product Name</label>
          <input type="text" name="name" class="form-control" value="{{ product.name }}">
        </div>

        <!-- CATEGORY -->
        <div class="mb-3">
          <label>Category</label>
          <select name="category" class="form-select">
            {% for c in categories %}
              <option value="{{ c.id }}" {% if product.category.id == c.id %}selected{% endif %}>
                {{ c.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- PRICE -->
        <div class="mb-3">
          <label>Price</label>
          <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}">
        </div>

        <!-- STOCK -->
        <div class="mb-3">
          <label>Stock</label>
          <input type="number" name="stock" class="form-control" value="{{ product.stock }}">
        </div>

<!-- DESCRIPTION -->
        <div class="mb-3">
          <label>Description</label>
          <textarea name="description" class="form-control">{{ product.description }}</textarea>
        </div>

        <!-- FEATURED CHECKBOX -->
        <div class="mb-3 form-check">
          <input type="checkbox" name="is_featured" class="form-check-input" id="is_featured" {% if product.is_featured %}checked{% endif %}>
          <label class="form-check-label fw-bold">🌟 Featured Product (Shows on Home)</label>
        </div>

        <!-- CARD IMAGE -->
        <div class="mb-3">
          <label>Card Image</label><br>
          <img src="{{ product.card_image.url }}" width="100"><br><br>
          <input type="file" name="card_image" class="form-control">
        </div>

        <!-- DETAIL IMAGE -->
        <div class="mb-3">
          <label>Detail Image</label><br>
          <img src="{{ product.detail_image.url }}" width="100"><br><br>
          <input type="file" name="detail_image" class="form-control">
        </div>

        <button class="btn btn-primary w-100">
          Update Product
        </button>

      </form>

    </div>
  </div>

</div>

{% endblock %}
