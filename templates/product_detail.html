{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            <img src="{{ product.detail_image.url }}" class="img-fluid">
        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h4 class="text-success">₹ {{ product.price }}</h4>

            <p>{{ product.description }}</p>

            <p>
                <b>Stock:</b>
                {% if product.stock > 0 %}
                Available
                {% else %}
                Out of Stock
                {% endif %}
            </p>

{% if not user.is_superuser %}

            <button onclick="addToCart('{{ product.id }}')" class="btn btn-success">
                Add to Cart
            </button>
            {% endif %}

        </div>

    </div>

</div>


{% endblock %}
