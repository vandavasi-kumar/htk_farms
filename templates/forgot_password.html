{% extends "base.html" %}
{% load static %}
{% block content %}
<form method="POST">
  {% csrf_token %}

  <h4>Reset Password</h4>

  <div class="mb-3">
    <label>Enter your email</label>
    <input type="email" name="email" class="form-control" required>
  </div>

  <button class="btn btn-success w-100">
    Send Reset Link
  </button>
</form>
{% endblock %}
<script src="{% static 'js/main.js' %}"></script>
